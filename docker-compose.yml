services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - BASE_URL=http://localhost:3000
      - SESSION_STORE_PATH=/data/sessions
      - SETTINGS_STORE_PATH=/data/settings
    volumes:
      - copilot-data:/data
    restart: unless-stopped

volumes:
  copilot-data:
